<script>
function toggleMode() {
    document.body.classList.toggle('dark-mode');
    localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
}
window.onload = function () {
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
    const c = getContent('about');
    document.getElementById('about-title').textContent = c.title;
    document.getElementById('about-p1').textContent = c.p1;
    document.getElementById('about-p2').textContent = c.p2;
    document.getElementById('about-p3').textContent = c.p3;
};
