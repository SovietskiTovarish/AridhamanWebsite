<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Careers — Aridhaman</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .job-listings { margin-top: 36px; }

        .job-card {
            border: 1px solid rgba(4, 17, 57, 0.13);
            padding: 24px 28px;
            margin-bottom: 20px;
            max-width: 680px;
            transition: border-color 0.2s ease;
        }

        .job-card:hover { border-color: var(--accent); }

        body.dark-mode .job-card {
            border-color: rgba(255, 255, 255, 0.1);
        }

        body.dark-mode .job-card:hover {
            border-color: var(--accent);
        }

        .job-card h3 {
            margin: 0 0 5px;
            color: var(--primary);
            font-size: 16px;
        }

        body.dark-mode .job-card h3 { color: var(--accent); }

        .job-meta {
            font-size: 13px;
            opacity: 0.55;
            margin-bottom: 12px;
        }

        .job-desc {
            font-size: 14px;
            line-height: 1.75;
            margin: 0;
        }

        .job-apply {
            display: inline-block;
            margin-top: 16px;
            padding: 8px 18px;
            border: 1px solid var(--accent);
            color: var(--accent);
            text-decoration: none;
            font-size: 13px;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .job-apply:hover {
            background: var(--accent);
            color: var(--primary);
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo-container">
        <img src="logo.png" class="logo-image" alt="Aridhaman logo">
        <div class="logo-text">Aridhaman</div>
    </a>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="updates.html">Updates</a>
        <a href="careers.html">Careers</a>
        <a href="contact.html">Contact Us</a>
    </nav>

    <button class="toggle-btn" onclick="toggleMode()" aria-label="Toggle dark mode">Dark / Light</button>
</header>

<main>
    <h1 id="careers-title"></h1>
    <p id="careers-intro"></p>
    <p id="careers-body"></p>
    <p id="careers-contact-note"></p>
    <p><a id="careers-email" href="#"></a></p>

    <div class="job-listings" id="job-listings"></div>
</main>

<footer>
    <div class="social-links">
        <a href="https://x.com/AridhamanLLP" target="_blank" rel="noopener" aria-label="X (Twitter)">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M18.9 2H21l-6.8 7.8L22 22h-6.3l-4.9-6.4L4.9 22H2.8l7.3-8.4L2 2h6.4l4.4 5.8L18.9 2z"/></svg>
        </a>
        <a href="https://instagram.com/aridhamanllp" target="_blank" rel="noopener" aria-label="Instagram">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5zm5 5a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm6-.8a1.2 1.2 0 1 0 0 2.4 1.2 1.2 0 0 0 0-2.4z"/></svg>
        </a>
        <a href="https://linkedin.com/company/aridhaman-llp" target="_blank" rel="noopener" aria-label="LinkedIn">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M4.98 3.5A2.48 2.48 0 1 0 5 8.46 2.48 2.48 0 0 0 4.98 3.5zM3 9h4v12H3zm7 0h3.8v1.7h.1c.5-.9 1.8-1.9 3.7-1.9 4 0 4.7 2.6 4.7 6V21h-4v-5.4c0-1.3 0-3-1.8-3s-2.1 1.4-2.1 2.9V21h-4z"/></svg>
        </a>
    </div>
    <p>© 2026 Aridhaman LLP</p>
</footer>

<script src="content.js"></script>
<script>
function toggleMode() {
    document.body.classList.toggle('dark-mode');
    localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
}

function escHtml(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

window.onload = function () {
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

    const c = getContent('careers');
    document.getElementById('careers-title').textContent = c.title;
    document.getElementById('careers-intro').textContent = c.intro;
    document.getElementById('careers-body').textContent = c.body;
    document.getElementById('careers-contact-note').textContent = c.contact_note;

    const emailEl = document.getElementById('careers-email');
    emailEl.textContent = c.contact_email;
    emailEl.href = 'mailto:' + c.contact_email;

    const container = document.getElementById('job-listings');
    const jobs = (c.jobs || []).filter(j => j.published);
    if (jobs.length === 0) { container.innerHTML = ''; return; }

    container.innerHTML = jobs.map(j => `
        <div class="job-card">
            <h3>${escHtml(j.title)}</h3>
            <div class="job-meta">${escHtml(j.location)}</div>
            <p class="job-desc">${escHtml(j.description)}</p>
            ${j.apply_link ? `<a class="job-apply" href="${escHtml(j.apply_link)}" target="_blank" rel="noopener">Apply →</a>` : ''}
        </div>
    `).join('');
};
</script>

</body>
</html>
